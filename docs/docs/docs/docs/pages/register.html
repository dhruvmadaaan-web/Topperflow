<!DOCTYPE html>
<html>
<head>
    <title>Register - TopperFlow</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div style="max-width: 500px; margin: 60px auto; padding: 40px; background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">
        <h2>Create Your Account</h2>
        <form>
            <div style="margin-bottom: 20px;">
                <label>Full Name</label>
                <input type="text" required style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label>Email</label>
                <input type="email" required style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label>Phone</label>
                <input type="tel" required style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label>Class</label>
                <select required style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 5px;">
                    <option>Class 9</option>
                    <option>Class 10</option>
                </select>
            </div>
            <button type="submit" style="width: 100%; background: #6366f1; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: 600; cursor: pointer;">Register</button>
        </form>
    </div>
</body>
</html>
