<!DOCTYPE html>
<html>
<head>
    <title>Login - TopperFlow</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div style="max-width: 400px; margin: 80px auto; padding: 40px; background: white; border-radius: 10px;">
        <h2>Login to TopperFlow</h2>
        <form>
            <div style="margin-bottom: 20px;">
                <label>Email</label>
                <input type="email" required style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label>Password</label>
                <input type="password" required style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 5px;">
            </div>
            <button type="submit" style="width: 100%; background: #6366f1; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: 600; cursor: pointer;">Login</button>
        </form>
    </div>
</body>
</html>
